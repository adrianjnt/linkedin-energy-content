version: '3.8'

services:
  scraper:
    build: .
    container_name: linkedin_energy_scraper
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    # Run scraper and exit (cron-like behavior)
    command: python -u scripts/run_scraper.py --db data/articles.db

  # Optional: web dashboard to view articles
